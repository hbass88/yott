          {cat:"IT/테크",title:"신형 가전/폰 루머",one:"신제품 공개 앞두고 스펙 유출/루머 확산",why:"신제품 공개 사이클 진입으로 스펙 유출 글이 IT 커뮤니티를 점령하는 구간.",points:["스펙 유출 확산","사전예약 관심 상승","비교 콘텐츠 증가"],kw:["신제품루머"]},
