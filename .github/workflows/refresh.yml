            mean:"'OO적 사고' 계보의 최신판으로, 자존심은 내려놓되 자존감은 지키는 초긍정 마이웨이 마인드셋을 뜻해요. 실패도 쿨하게 받아들이는 태도가 핵심이에요.",
            why:"방송/인터뷰에서 나온 특유의 낙천적 화법이 '이게 바로 장항준적 사고'라며 밈이 됐어요.",
            ex:"떨어졌지만 뭐 어때, 이게 장항준적 사고지"},
          {t:"숏셜링",tag:"유행어",d:"짧고 가볍게 관계를 맺는 Z세대 신조어",
            mean:"짧을 short와 사교 socializing을 합친 말로, 부담 없이 짧고 가볍게 관계를 맺고 즐기는 새로운 사교 방식을 가리켜요. 깊은 관계보다 가벼운 연결을 선호하는 흐름을 담아요.",
            why:"관계 피로감이 커지면서 '가볍게 만나자'는 정서가 신조어로 자리 잡았어요.",
            ex:"요즘은 깊게 말고 숏셜링으로 가볍게 만나"},
          {t:"자베스",tag:"유행어",d:"[감정]에 '자베스'를 붙여 우아하게 호들갑",
            mean:"'난리자베스'에서 파생된 접미사로, 감정 단어 뒤에 '자베스'를 붙여 마치 귀족처럼 우아하게 호들갑을 떠는 만능 감정 표현이에요.",
            why:"어디에 붙여도 말이 되는 확장성 덕분에 댓글/자막에서 놀이처럼 번졌어요.",
            ex:"이 디저트 감동자베스… 행복자베스…"},
          {t:"젓가락워킹",tag:"챌린지",d:"젓가락 두 개로 시크하게 걷는 런웨이 챌린지",
            mean:"젓가락 두 개를 다리처럼 세워 시크하게 워킹시키는 미니 런웨이 챌린지예요. 걱정을 걷어차듯 당당하게 걷는 연출이 포인트예요.",
            why:"준비물이 젓가락뿐이라 참여 장벽이 낮아 따라 하기 콘텐츠가 늘었어요.",
            ex:"걱정 많은 날엔 젓가락워킹으로 스트레스 걷어차기"},
          {t:"단어 리듬 게임",tag:"챌린지",d:"'밥밥밥빵' 4박자에 맞추는 숏폼 리듬 놀이",
            mean:"'밥밥밥빵'처럼 단어를 4박자 리듬에 맞춰 주고받는 글로벌 숏폼 리듬 게임이에요. 박자를 놓치면 지는 단순한 규칙이 중독성의 핵심이에요.",
            why:"언어 장벽이 낮아 해외에서도 따라 하며 글로벌 챌린지로 번졌어요.",
            ex:"친구랑 밥·밥·밥·빵 리듬 게임하다 빵 터짐"},
          {t:"직업 수상하게 설명하기",tag:"밈",d:"내 직업을 일부러 수상하게 설명하는 자조 유머",
            mean:"자기 직업을 최대한 애매하고 수상하게 설명해 반전 웃음을 주는 직장인 자조 유머예요. 실제로는 평범한 일인데 미스터리하게 포장하는 게 규칙이에요.",
            why:"'내 직업 맞혀봐' 식 참여형 포맷이라 댓글 놀이로 확산됐어요.",
            ex:"저는 하루 종일 남의 돈을 세는 일을 해요 (은행원)"},
          {t:"커터칼퇴",tag:"유행어",d:"미련 없이 칼같이 정시 퇴근한다는 직장인 유행어",
            mean:"커터칼로 자르듯 미련 없이 딱 끊고 정시에 퇴근한다는 뜻의 직장인 유행어예요. 야근 문화에 대한 가벼운 저항과 워라밸 선언을 담고 있어요.",
            why:"칼퇴를 더 세게 표현한 말장난이 공감대를 얻으며 직장인 사이에서 번졌어요.",
            ex:"오늘은 무조건 커터칼퇴한다"},
          {t:"라이팅힙",tag:"유행어",d:"손글씨·필사가 힙하다, 아날로그 역주행 유행",
            mean:"손글씨 쓰기와 필사(따라 쓰기)가 오히려 힙하다는 정서를 담은 말이에요. AI/디지털 시대에 아날로그 취미가 역주행하는 흐름을 가리켜요.",
            why:"디지털 피로감 속에서 '느린 취미'가 재조명되며 필사 인증이 늘었어요.",
            ex:"주말엔 카페에서 필사하는 게 요즘 라이팅힙이지"}
          ];
          
          function buildTrends(trends, doy){
            let pool=[];
            for(const c of (trends||[])){
              const title=clean(c.title); if(!title) continue;
              const news=c.items||[];
              const text=title+" "+news.map(n=>n.t).join(" ");
              if(heavy(text)||boring(title)) continue;
              const nlist=news.map(n=>({t:clean(n.t),u:(n.u||"").trim(),s:clean(n.s||"")})).filter(n=>n.t).slice(0,4);
              const lead=nlist[0]?nlist[0].t:"";
              const srcs=[...new Set(nlist.map(n=>n.s).filter(Boolean))].slice(0,3).join(", ");
              pool.push({traf:parseTraffic(c.traffic),cat:catOf(text),title,
                one:lead||"실시간 급상승 검색어로 떠오른 이슈",
                why:lead
                  ?`지금 '${title}'가 화제인 이유예요 — ${lead} ${srcs?("("+srcs+" 등) "):""}관련 소식 ${nlist.length}건이 여러 매체에서 거의 동시에 나오면서 검색량이 빠르게 오르고 있어요. 아래 '관련 소식' 원문과 채널별 링크에서 배경과 반응을 바로 확인할 수 있어요.`
                  :`구글 트렌드 KR 실시간 급상승 키워드로, 관련 소식이 함께 확산되며 검색량이 빠르게 오르는 중이에요.`,
                news:nlist,
                kw:[title],src:"trend"});
            }
            pool.sort((a,b)=>b.traf-a.traf);
            const seen=new Set(); let uniq=[];
            for(const p of pool){ if(seen.has(p.title))continue; seen.add(p.title); uniq.push(p); }
            let pi=doy, guard=0;
            while(uniq.length<20 && guard++<200){ const t=TREND_POOL[((pi++)%TREND_POOL.length+TREND_POOL.length)%TREND_POOL.length]; if(seen.has(t.title))continue; seen.add(t.title); uniq.push({traf:0,src:"pool",...t}); }
            uniq=uniq.slice(0,20);
            return uniq.map((c,i)=>{
              const rank=i+1;
              const bump=c.traf>=20000?120:c.traf>=10000?80:c.traf>=2000?40:0;
              const vel=Math.max(72,560-rank*24+bump);
              const mv=c.traf||(12000-rank*400);
              const mention=mv>=10000?(mv/10000).toFixed(1)+"만":Math.max(3,Math.round(mv/1000))+"천";
              const pct=Math.max(58,88-rank);
              const pts=(c.points&&c.points.length)?c.points.slice(0,3):["실시간 검색량 급상승 감지","관련 기사/콘텐츠 다수 확산","커뮤니티 언급 증가 추세"];
              return {id:rank,rank,cat:c.cat,title:c.title,
                status:(rank<=5||c.traf>=10000)?"hot":"rise",
                one:c.one,why:c.why,points:pts,news:(c.news||[]),kw:(c.kw&&c.kw.length?c.kw:[c.title]),
                vel,mention,sent:`${emo(c.cat)} ${pct}%`,
                spark:[8+(i%9),15+(i%7),26,40,58,80,100]};
            });
          }
          function buildMemes(memeNews, doy){
            const out=[]; const seen=new Set();
            for(const m of (memeNews||[])){
              const full=clean(m.t); if(!full||heavy(full))continue;
              const t=full.split(/[?!,]/)[0].trim().slice(0,18); if(!t||seen.has(t))continue;
              seen.add(t); out.push({t,tag:"밈",d:full.slice(0,60),mean:full,why:"커뮤니티와 숏폼에서 빠르게 번지며 고구마팜 등 밈 큐레이션에 소개된 최신 유행이에요. 정확한 뉘앙스와 반응은 아래 채널에서 확인해 보세요.",src:"고구마팜"});
              if(out.length>=2)break;
            }
            let pi=doy, guard=0;
            while(out.length<10 && guard++<200){ const m=MEME_POOL[((pi++)%MEME_POOL.length+MEME_POOL.length)%MEME_POOL.length]; if(seen.has(m.t))continue; seen.add(m.t); out.push(m); }
            return out.slice(0,10);
          }
          function buildDataJs(src, trends, memeNews, now){
            const doy=Math.floor((now+9*3600000)/86400000);
            const TR=buildTrends(trends,doy);
            const ME=buildMemes(memeNews,doy);
            const SO=rot(SOON_POOL,4,doy).map((s,i)=>({id:101+i,...s}));
            const CO=rot(COOLING_POOL,12,doy*2).map((c,i)=>({id:201+i,...c}));
            const blk=(s,name,lit)=>{const a=`/*__${name}__*/`,b=`/*__/${name}__*/`;const i=s.indexOf(a),j=s.indexOf(b);if(i<0||j<0)throw new Error("marker missing: "+name);return s.slice(0,i+a.length)+"\n"+lit+"\n"+s.slice(j);};
            src=blk(src,"TRENDS",`const TRENDS = ${JSON.stringify(TR)};`);
            src=blk(src,"SOON",`const SOON = ${JSON.stringify(SO)};`);
            src=blk(src,"COOLING",`const COOLING = ${JSON.stringify(CO)};`);
            src=blk(src,"MEMES",`const MEMES = ${JSON.stringify(ME)};`);
            const kst=new Date(now+9*3600000);
            src=src.replace(/month:"[^"]*"/, "month:"+JSON.stringify(`${kst.getUTCFullYear()}년 ${kst.getUTCMonth()+1}월`));
            if(TR[0]) src=src.replace(/headline:"[^"]*"/, "headline:"+JSON.stringify(`오늘의 최대 화제: ${TR[0].title}`));
            if(src.indexOf("·")>=0) throw new Error("middle-dot detected");
            return src;
          }
          
          // ---------- fetch helpers ----------
          const tag=(x,t)=>{const m=x.match(new RegExp(`<${t}[^>]*>([\\s\\S]*?)</${t}>`));return m?m[1].trim():"";};
          async function get(u){try{const r=await fetch(u,{headers:{'user-agent':'Mozilla/5.0'}});return r.ok?await r.text():"";}catch(e){return "";}}
          
          // ---------- fetch live trends + feeds (filtered by HEAVY) ----------
          const tXml=await get("https://trends.google.com/trending/rss?geo=KR");
          const trends=[...tXml.matchAll(/<item>([\s\S]*?)<\/item>/g)].map(m=>{
            const it=m[1];
            const items=[...it.matchAll(/<ht:news_item>([\s\S]*?)<\/ht:news_item>/g)].map(n=>({t:clean(tag(n[1],"ht:news_item_title")),u:tag(n[1],"ht:news_item_url"),s:clean(tag(n[1],"ht:news_item_source"))||"뉴스"}));
            return {title:clean(tag(it,"title")),traffic:tag(it,"ht:approx_traffic"),items};
          }).filter(c=>c.title&&!heavy(c.title+" "+c.items.map(n=>n.t).join(" ")));
          async function feed(u,def){const x=await get(u);return [...x.matchAll(/<item>([\s\S]*?)<\/item>/g)].map(m=>({t:clean(tag(m[1],"title")),u:tag(m[1],"link").replace(/<!\[CDATA\[|\]\]>/g,""),s:def})).filter(i=>i.t&&!heavy(i.t)).slice(0,15);}
          const ent=await feed("https://www.yna.co.kr/rss/entertainment.xml","연합뉴스");
          const tech=await feed("https://feeds.feedburner.com/zdkorea","ZDNet");
          let memeNews=[];
          try{const mx=await get("https://gogumafarm.kr/feed");memeNews=[...mx.matchAll(/<item>([\s\S]*?)<\/item>/g)].map(m=>({t:clean(tag(m[1],"title")),u:tag(m[1],"link").replace(/<!\[CDATA\[|\]\]>/g,""),s:"고구마팜"})).filter(i=>i.t&&!heavy(i.t)).slice(0,8);}catch(e){}
          
          // ---------- write live-cache (sidebar feed) ----------
          fs.writeFileSync("live-cache.json",JSON.stringify({updated:new Date().toISOString(),trends,ent,tech,memeNews},null,1));
          
          // ---------- update 기준 날짜 in html ----------
          const kst=new Date(Date.now()+9*3600*1000);
          const d=`${kst.getUTCFullYear()}.${String(kst.getUTCMonth()+1).padStart(2,"0")}.${String(kst.getUTCDate()).padStart(2,"0")}`;
          for(const f of ["index.html","map/index.html"]){if(!fs.existsSync(f))continue;fs.writeFileSync(f,fs.readFileSync(f,"utf8").replace(/20\d{2}\.\d{2}\.\d{2} 기준/g,`${d} 기준`));}
          
          // ---------- regenerate data.js (TRENDS/SOON/COOLING/MEMES) with validation guard ----------
          try{
            const nd=buildDataJs(fs.readFileSync("data.js","utf8"),trends,memeNews,Date.now());
            fs.writeFileSync("/tmp/yc.js",nd);
            execSync("node --check /tmp/yc.js",{stdio:"pipe"});
            const chk=nd+"\nconst _ok=Array.isArray(TRENDS)&&TRENDS.length===20&&Array.isArray(SOON)&&SOON.length===4&&Array.isArray(COOLING)&&COOLING.length>=10&&Array.isArray(MEMES)&&MEMES.length===10&&Array.isArray(ALL)&&ALL.length>100&&new Set(ALL.map(x=>x.id)).size===ALL.length;if(!_ok)process.exit(9);";
            fs.writeFileSync("/tmp/yck.js",chk);
            execSync("node /tmp/yck.js",{stdio:"pipe"});
            fs.writeFileSync("data.js",nd);
            console.log("data.js regenerated OK: liveTrends="+trends.length+" -> TOP20 rebuilt");
          }catch(e){console.error("data.js regen skipped (kept previous):",e.message);}
          
          console.log("live-cache updated",d,"trends:",trends.length,"ent:",ent.length,"tech:",tech.length,"memeNews:",memeNews.length);
          EOF
          node refresh.mjs
      - name: Commit and push
        run: |
          git config user.name "yott-bot"
          git config user.email "actions@github.com"
          git add live-cache.json index.html map/index.html data.js
          git diff --cached --quiet || git commit -m "auto-refresh $(date -u +%F)"
          git push
      - name: Deploy to cPanel (yozmkorea.com) via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          server-dir: public_html/
          local-dir: ./
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/node_modules/**
            README.md
            *.mjs
            *.md
