name: refresh-trends

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      - name: Fetch trends and regenerate data.js
        run: |
          cat > refresh.mjs <<'EOF'
          import fs from 'node:fs';
          import { execSync } from 'node:child_process';
          // YOTT rule-based data.js generator (shared by workflow + local test)
          const HEAVY=["대통령","선거","투표","국회","의원","정당","정치","탄핵","북한","전쟁","사망","숨져","숨진","별세","참변","살해","살인","화재","지진","폭발","추락","침몰","구속","영장","검찰","기소","혐의","법원","재판","회생","파산","징역","성폭","마약","음주운전","금리","환율","코스피","코스닥","증시","증권","주가","상한가","하한가","주가조작","연금","기초연금","부동산","보유세","종부세","세금","정부","장관","청와대","여당","야당","경찰","대법원","헌재","파업","집회","시위","유가족","부상자","이혼","불륜","논란","피습","총격","테러","실종","시신","폭력","학폭","횡령","배임","사기","비위","갑질","극단적","자살","결별","열애설","주주","주총","유상증자","상장폐지","공모주","배당","IPO","임시주총","인수합병","실적","어닝","적자","흑자전환"];
          const BORING=["과잉공급","공급과잉","영업이익","실적발표","분기 실적","반기 실적","수주","증설"];
          const heavy=s=>HEAVY.some(w=>s.includes(w));
          const boring=s=>BORING.some(w=>s.includes(w));
          const clean=s=>(s||"").replace(/<!\[CDATA\[|\]\]>/g,"").replace(/\s*-\s*[^-]+$/,"").replace(/\[[^\]]*\]/g,"").replace(/&amp;/g,"&").replace(/&quot;|&#39;|&apos;/g,"'").replace(/&lt;/g,"<").replace(/&gt;/g,">").replace(/[·・･]/g,"/").replace(/\s+/g," ").trim();
          const parseTraffic=t=>{const m=(t||"").replace(/[+,]/g,"").match(/\d+/);return m?parseInt(m[0],10):0;};
          
          const CATRULES=[
          [/아이돌|컴백|앨범|타이틀곡|팬미팅|데뷔|걸그룹|보이그룹|엔시티|에스파|아이브|르세라핌|세븐틴|정규 [0-9]|미니앨범|수록곡|뮤비|콘셉트 포토/,"아이돌"],
          [/콘서트|페스티벌|워터밤|흠뻑쇼|내한|음원|음악방송|버스킹|밴드|발라드|힙합/,"음악"],
          [/드라마|배우|방영|회차|첫 방송|종영|주연|미니시리즈/,"K-드라마"],
          [/예능|출연|MC|녹화|시청률|웹예능|관찰 예능/,"예능/방송"],
          [/영화|개봉|박스오피스|감독|시사회|관객|스크린|천만/,"영화"],
          [/바둑|국수전|프로기사|기왕전/,"스포츠"],
          [/야구|KBO|MLB|홈런|투수|타자|선발|타율|메이저리그|구단/,"야구"],
          [/축구|손흥민|이적|월드컵|K리그|국가대표|프리미어리그|EPL|대표팀/,"축구"],
          [/LCK|롤드컵|발로란트|페이커|e스포츠|롤 [0-9]|디도스/,"e스포츠"],
          [/게임|출시|업데이트|스팀|신작|공략|사전예약|모바일게임|패치/,"게임"],
          [/AI|인공지능|반도체|삼성전자|LG전자|애플|갤럭시|아이폰|엔비디아|앱 업데이트|스마트폰|배터리|로봇|클라우드/,"IT/테크"],
          [/우주|천체|은하수|발사|위성|생물 발견|기후 데이터|백신|연구진/,"과학"],
          [/웹툰|애니|만화|성우|코스프레|단행본/,"웹툰/애니"],
          [/삼계탕|냉면|보양식|맛집|웨이팅|먹방|국밥|치킨|버거|노포|백반|빵집/,"맛집"],
          [/카페|디저트|빙수|케이크|쿠키|베이글|도넛|커피|소금빵|말차/,"카페/디저트"],
          [/폭염|장마|태풍|열대야|한파|기온|소나기|무더위|미세먼지|장맛비/,"날씨"],
          [/여행|항공권|휴가|제주|공항|호캉스|캠핑|숙소|해수욕장/,"여행"],
          [/뷰티|화장품|선크림|선케어|메이크업|스킨케어|향수|파운데이션/,"뷰티"],
          [/패션|룩|스타일|코디|운동화|스니커|가방|샌들|린넨/,"패션"],
          [/세일|할인|품절|다이소|편의점|쇼핑|공동구매|직구|리퍼브|오픈런/,"상품/쇼핑"],
          [/헬스|러닝|다이어트|필라테스|요가|수영|등산|클라이밍|혈당/,"건강/운동"],
          [/반려|강아지|고양이|댕댕이|냥스타|펫/,"반려동물"],
          [/자동차|전기차|하이브리드|신차|충전|차박|캠핑카/,"자동차"],
          [/인테리어|정리|가전|제습|수납|홈캠핑/,"리빙"]
          ];
          const catOf=t=>{for(const [re,c] of CATRULES) if(re.test(t)) return c; return "요즘 유행";};
          const CAT_EMOJI={"아이돌":"💜","K-팝":"🎧","음악":"🎵","K-드라마":"📺","예능/방송":"📺","영화":"🎬","야구":"⚾","축구":"⚽","e스포츠":"🏆","게임":"🎮","IT/테크":"💻","과학":"🔬","웹툰/애니":"🎨","맛집":"🍜","카페/디저트":"🧋","날씨":"🌤","여행":"✈️","뷰티":"💄","패션":"👗","상품/쇼핑":"🛍","건강/운동":"💪","반려동물":"🐾","자동차":"🚗","리빙":"🛋","요즘 유행":"🔥","유명인":"⭐"};
          const emo=c=>CAT_EMOJI[c]||"🔥";
          const rot=(a,n,off)=>{const o=[];for(let k=0;k<n;k++)o.push(a[(((off+k)%a.length)+a.length)%a.length]);return o;};
          
          const TREND_POOL=[
          {cat:"요즘 유행",title:"숏폼 챌린지 유행",one:"이번 주 릴스/쇼츠를 점령한 챌린지 포맷",why:"참여 장벽이 낮은 챌린지가 알고리즘을 타며 업로드가 급증하는 초기 확산 국면.",points:["숏폼 업로드 급증","신규 해시태그 생성 활발","참여형 확산 단계 진입"],kw:["숏폼챌린지"]},
          {cat:"카페/디저트",title:"신상 디저트 오픈런",one:"비주얼 좋은 신상 디저트에 웨이팅 행렬",why:"커팅 리액션 영상 포맷과 궁합이 좋아 카페들이 연이어 출시하며 인증샷이 늘어나는 중.",points:["인증샷 업로드 급증","주말 웨이팅 후기 등장","프랜차이즈 확산 조짐"],kw:["신상디저트"]},
          {cat:"아이돌",title:"컴백 시즌 화력",one:"주요 그룹 컴백이 몰리며 음원차트 자리싸움",why:"발매 직후 음악방송과 챌린지로 2차 화력이 이어지는 전형적 컴백 사이클.",points:["음원차트 경쟁 활발","직캠 교차편집 확산","챌린지 참여 릴레이"],kw:["컴백시즌"]},
          {cat:"상품/쇼핑",title:"편의점 신상 대란",one:"신상 콜라보 상품이 오픈런/품절 행렬",why:"한정 수량 마케팅이 인증 릴레이로 확산되며 재입고 문의가 폭주하는 구간.",points:["품절 인증 확산","리셀 매물 등장","재입고 문의 폭주"],kw:["편의점신상"]},
          {cat:"맛집",title:"노포 성지순례",one:"유튜버발 노포 콘텐츠에 웨이팅 급증",why:"'3대 째' 서사가 먹방 유튜브를 통해 지역 상권 웨이팅으로 직결되는 패턴.",points:["먹방 유튜버 조명","웨이팅 급증","지도 저장 수 증가"],kw:["노포성지"]},
